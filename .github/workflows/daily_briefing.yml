name: Daily Stock Strategy Briefing

on:
  schedule:
    # 월~금 아침 08:40 KST (일~목 23:40 UTC)
    - cron: '40 23 * * 0-4'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests yfinance finance-datareader beautifulsoup4 pandas

    - name: Run Daily Briefing
      env:
        # GitHub Secrets에 TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID 등록 필요
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python telegram_briefing.py
        python winner_takes_all.py
